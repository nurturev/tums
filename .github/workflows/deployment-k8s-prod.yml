name: Deploy Prod K8s
on:
  push:
    branches:
      - prod

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: arn:aws:iam::979176640062:role/github-action-role
          aws-region: us-east-1
          mask-aws-account-id: 'false'

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 979176640062.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 -t tums-kub .
          docker tag tums-kub:latest 979176640062.dkr.ecr.us-east-1.amazonaws.com/tums-kub:latest
          docker push 979176640062.dkr.ecr.us-east-1.amazonaws.com/tums-kub:latest

      - name: Deploy to Kubernetes
        run: |
          echo "${{ secrets.KUBECONFIG_PROD }}" > kubeconfig_prod
          export KUBECONFIG=kubeconfig_prod
          kubectl rollout restart deploy tums -n prod
