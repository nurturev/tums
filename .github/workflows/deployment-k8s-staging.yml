# Github actions to deploy to Kubernetes

name: Deploy Staging K8s
on:
  push:
    branches:
      - staging

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: arn:aws:iam::979176640062:role/github-action-role
          aws-region: ap-south-1
          mask-aws-account-id: 'false'

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 979176640062.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build and push Docker image
        run: |
          docker build --no-cache --platform linux/amd64 -t tums-kub .
          docker tag tums-kub:latest 979176640062.dkr.ecr.ap-south-1.amazonaws.com/tums-kub:latest
          docker push 979176640062.dkr.ecr.ap-south-1.amazonaws.com/tums-kub:latest

      - name: Deploy to Kubernetes
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig_staging
          export KUBECONFIG=kubeconfig_staging
          kubectl rollout restart deploy tums -n staging
